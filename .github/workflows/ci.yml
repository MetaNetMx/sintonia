# CI minimo (hallazgo P3 de la auditoria externa 2026-07-08):
# cada push/PR corre los tests de contratos criticos y verifica que compila.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
